appId: 'PokeAuroraLauncher'
productName: 'Poke Aurora Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Poke Aurora'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,.eslintrc.json}'

extraResources:
  - 'libraries'
  - 'lang'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'Poke Aurora'
  vendor: 'javiersarmient0'
  synopsis: 'Poke Aurora Launcher'
  description: 'Launcher Oficial de Poke Aurora'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'