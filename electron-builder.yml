appId: 'com.pokeaurora.launcher'
productName: 'Poke Aurora Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Poke Aurora'

asar: true
compression: 'maximum'

directories:
  buildResources: 'build'
  output: 'dist'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,.eslintrc.json}'

extraResources:
  - 'libraries'
  - 'lang'

win: 
  target: 
    - target: 'nsis'
      arch: 'x64'
  icon: 'build/icon.ico' 

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true